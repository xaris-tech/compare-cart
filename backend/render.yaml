version: 2
build:
  command: pip install -r requirements.txt
  python:
    version: "3.12"

services:
  - type: web
    name: comparecart-api
    env: python
    region: oregon
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: stepfun/step-3.5-flash:free