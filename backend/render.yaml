services:
  - type: python
    name: comparecart-api
    runtime: python312
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: stepfun/step-3.5-flash:free